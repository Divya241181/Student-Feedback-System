{% for co in cos %}
<div class="flex items-start gap-3 bg-white dark:bg-dark-card border border-slate-200 dark:border-dark-border
            rounded-xl px-4 py-3 mb-2 hover:border-primary/40 dark:hover:border-primary/30 transition-colors group">
  <span class="badge badge-green font-tech mt-0.5 flex-shrink-0 text-[11px]">{{ co.code }}</span>
  <p class="text-sm text-slate-600 dark:text-slate-300 leading-snug group-hover:text-slate-800 dark:group-hover:text-slate-100 transition-colors">
    {{ co.description }}
  </p>
</div>
{% empty %}
<div class="text-center py-8 border border-dashed border-slate-200 dark:border-dark-border rounded-xl">
  <div class="w-10 h-10 rounded-xl bg-slate-100 dark:bg-dark-muted flex items-center justify-center mx-auto mb-3">
    <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
            d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
    </svg>
  </div>
  <p class="text-sm text-slate-400 dark:text-slate-500 font-medium">No outcomes added yet.</p>
  <p class="text-xs text-slate-300 dark:text-slate-600 mt-0.5">Add CO1, CO2… using the form above.</p>
</div>
{% endfor %}
